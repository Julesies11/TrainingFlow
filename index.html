<!doctype html>
<html class="h-full" lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/media/app/favicon.ico" sizes="any" />
    <link rel="icon" href="/media/app/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/media/app/apple-touch-icon.png" />
    <link rel="manifest" href="/media/app/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <meta name="description" content="" />
    <meta
      name="keywords"
      content="keenthemes,react,material,kit,application,dashboard,admin,template"
    />
    <meta name="author" content="Metronic - Tailwind React Template" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700"
    />
    <style>
      .dark body {
        background-color: #0f172a;
      }
    </style>
    <script>
      (function () {
        try {
          const theme = localStorage.getItem('theme') || 'system';
          const prefersDark = window.matchMedia(
            '(prefers-color-scheme: dark)',
          ).matches;
          const isDarkMode =
            theme === 'dark' || (theme === 'system' && prefersDark);
          if (isDarkMode) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <!-- Google Identity Services client script for OIDC Auth -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Microsoft Authentication Library (MSAL.js) for client-side OIDC -->
    <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.2/lib/msal-browser.min.js" async defer></script>
  </head>
  <body class="text-foreground bg-background flex h-full text-base antialiased">
    <div class="flex grow" id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
